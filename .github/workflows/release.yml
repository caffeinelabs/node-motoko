name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9] ]]; then
            echo "::error::Release tag must start with 'v' (got: $GITHUB_REF_NAME)"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        # Auth via OIDC trusted publishers -- no NPM_TOKEN needed.
        # Requires: npm package linked to this repo + "npm" environment in GitHub settings.
        # See RELEASING.md or PR #165 description for setup instructions.
        run: npm publish --provenance
